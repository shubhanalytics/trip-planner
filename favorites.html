<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#667eea" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self'; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <title>Your Saved Destinations - WanderHub</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈️</text></svg>" />
</head>
<body>
    <div class="bg-orb orb-1" aria-hidden="true"></div>
    <div class="bg-orb orb-2" aria-hidden="true"></div>
    <div class="bg-grid" aria-hidden="true"></div>

    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <span class="logo-icon">✈️</span>
                <h1>WanderHub</h1>
            </div>
            <div class="header-right">
                <div class="music-player" id="musicPlayer" aria-label="Background music controls">
                    <div class="music-track">
                        <span class="music-icon" aria-hidden="true">🎵</span>
                    </div>
                    <div class="music-actions">
                        <button class="music-btn music-btn-play" id="musicPlay" title="Play music" aria-label="Play music">▶</button>
                        <button class="music-btn music-btn-pause" id="musicPause" title="Pause music" aria-label="Pause music">⏸</button>
                    </div>
                </div>
                <div class="theme-selector">
                    <button id="themeToggle" class="theme-toggle" type="button" aria-label="Enable dark mode" title="Toggle light/dark mode">🌙</button>
                </div>
                <a class="favorites-shortcut back-to-home" href="index.html" aria-label="Back to explorer" title="Back to explorer">
                    <span class="favorites-shortcut-icon" aria-hidden="true">🏠</span>
                </a>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Favorites Section -->
        <section class="favorites-page" id="favoritesPage">
            <div class="favorites-header">
                <div class="favorites-title-group">
                    <h2 class="favorites-page-title">Your Saved Destinations</h2>
                    <p class="favorites-page-subtitle">Your shortlist of handpicked destinations ready to explore</p>
                </div>
                <button class="clear-all-btn" id="clearAllFavorites" type="button">Clear All</button>
            </div>

            <div class="favorites-empty" id="favoritesEmpty">
                <div class="empty-icon" aria-hidden="true">❤️</div>
                <h3>No saved destinations yet</h3>
                <p>Start exploring and save your favorite destinations to build your personal shortlist</p>
                <a href="index.html" class="hero-btn hero-btn-primary">Explore Destinations</a>
            </div>

            <div class="favorites-grid" id="favoritesGrid">
                <!-- Favorites will be dynamically loaded here -->
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>Made with ❤️ for curious explorers • WanderHub © 2026</p>
    </footer>

    <script src="favorites.js"></script>
</body>
</html>

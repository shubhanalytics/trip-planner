<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Toggle Preview</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    :root{--preview-width:420px}
    body{font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; padding:2rem; background:var(--bg-primary);}
    .preview-bar{display:flex;align-items:center;gap:12px;padding:14px;border-radius:12px;background:var(--card-bg);border:1px solid var(--border-color);box-shadow:var(--shadow-sm);width:var(--preview-width)}
    .pill{display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;background:var(--bg-secondary);border:1px solid var(--border-color);color:var(--text-primary);font-weight:700}
    .note{margin-top:12px;color:var(--text-muted);font-size:0.9rem}
  </style>
</head>
<body>
  <div class="preview-bar">
    <div class="pill">Location: Not enabled</div>

    <label class="location-toggle" title="Location">
      <input type="checkbox" id="locToggle" />
      <span class="toggle-slider" aria-hidden="true"></span>
    </label>
  </div>

  <div class="note">Try clicking the toggle to see the checked state (right) and hover to view effects.</div>
</body>
</html>
